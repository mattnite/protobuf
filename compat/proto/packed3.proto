syntax = "proto3";


message PackedScalars {
    repeated fixed32 f_fixed32 = 1;
    repeated fixed64 f_fixed64 = 2;
    repeated sfixed32 f_sfixed32 = 3;
    repeated sfixed64 f_sfixed64 = 4;
    repeated uint32 f_uint32 = 5;
    repeated uint64 f_uint64 = 6;
    repeated sint32 f_sint32 = 7;
    repeated sint64 f_sint64 = 8;
    repeated float f_float = 9;
    repeated int32 f_int32 = 10;
    repeated int64 f_int64 = 11;
}
