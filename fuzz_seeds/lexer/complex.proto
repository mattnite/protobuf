syntax = "proto3";
import "other.proto";
option java_package = "com.example";
message Outer {
  message Inner {
    int32 x = 1;
  }
  oneof choice {
    string name = 1;
    Inner sub = 2;
  }
  map<string, int32> labels = 3;
  reserved 10, 20 to 30;
}
service MyService {
  rpc Get(Outer) returns (Outer);
}
