name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit-tests:
    runs-on: x86_64-linux
    steps:
      - uses: actions/checkout@v4

      - uses: https://codeberg.org/mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run unit tests
        run: zig build test

  protoc-tests:
    runs-on: x86_64-linux
    steps:
      - uses: actions/checkout@v4

      - uses: https://codeberg.org/mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install protoc
        run: |
          apt-get update && apt-get install -y curl unzip
          curl -fsSL https://github.com/protocolbuffers/protobuf/releases/download/v29.3/protoc-29.3-linux-x86_64.zip -o protoc.zip
          unzip -q protoc.zip -d /usr/local
          rm protoc.zip

      - name: Run protoc plugin tests
        run: zig build protoc-test

  compat-tests:
    runs-on: x86_64-linux
    steps:
      - uses: actions/checkout@v4

      - uses: https://codeberg.org/mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Install curl
        run: apt-get update && apt-get install -y curl

      - name: Install Go
        run: |
          curl -fsSL https://go.dev/dl/go1.23.6.linux-amd64.tar.gz | tar -C /usr/local -xz
          echo "/usr/local/go/bin" >> "$GITHUB_PATH"

      - name: Generate Go test vectors
        working-directory: compat/go
        run: go run ./cmd/generate

      - name: Run Zig compat tests
        working-directory: compat
        run: zig build test

      - name: Validate Zig vectors with Go
        working-directory: compat/go
        run: go run ./cmd/validate

  conformance-tests:
    runs-on: x86_64-linux
    steps:
      - uses: actions/checkout@v4

      - uses: https://codeberg.org/mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build conformance runner
        run: |
          apt-get update && apt-get install -y curl cmake g++
          git clone --depth=1 https://github.com/protocolbuffers/protobuf /tmp/protobuf
          cmake -S /tmp/protobuf -B /tmp/protobuf/build -Dprotobuf_BUILD_CONFORMANCE=ON -DCMAKE_BUILD_TYPE=Release
          cmake --build /tmp/protobuf/build --target conformance_test_runner -j$(nproc)

      - name: Run conformance tests
        working-directory: conformance
        run: zig build run -Dconformance-runner=/tmp/protobuf/build/conformance_test_runner

  fuzz-afl:
    runs-on: x86_64-linux
    steps:
      - uses: actions/checkout@v4

      - uses: https://codeberg.org/mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run AFL++ fuzz target and upload to Cairn
        uses: https://git.ts.mattnite.net/mattnite/cairn/actions/cairn-zig-fuzz@main
        with:
          cairn_server: ${{ secrets.CAIRN_SERVER_URL }}
          repo: ${{ github.event.repository.name }}
          owner: ${{ github.repository_owner }}
          commit: ${{ github.event.pull_request.head.sha }}
          zig_build_args: |
            fuzz -Dfuzz-target=lexer
            fuzz -Dfuzz-target=resolve_string
            fuzz -Dfuzz-target=parser
            fuzz -Dfuzz-target=varint_decode
            fuzz -Dfuzz-target=varint_roundtrip
            fuzz -Dfuzz-target=zigzag32_roundtrip
            fuzz -Dfuzz-target=zigzag64_roundtrip
            fuzz -Dfuzz-target=tag_decode
            fuzz -Dfuzz-target=tag_roundtrip
            fuzz -Dfuzz-target=fixed32_roundtrip
            fuzz -Dfuzz-target=fixed64_roundtrip
            fuzz -Dfuzz-target=int32_roundtrip
            fuzz -Dfuzz-target=sint32_roundtrip
            fuzz -Dfuzz-target=sint64_roundtrip
            fuzz -Dfuzz-target=field_iterator
            fuzz -Dfuzz-target=skip_field
            fuzz -Dfuzz-target=skip_group
            fuzz -Dfuzz-target=packed_varint
            fuzz -Dfuzz-target=packed_fixed32
            fuzz -Dfuzz-target=packed_fixed64
            fuzz -Dfuzz-target=message_roundtrip
            fuzz -Dfuzz-target=json_scanner
            fuzz -Dfuzz-target=text_scanner
            fuzz -Dfuzz-target=dynamic_decode
          duration: "120"
          afl_args: "-m none"
          target: "x86_64-linux"
