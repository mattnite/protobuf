name: Fuzz

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  fuzz-afl:
    runs-on: x86_64-linux
    steps:
      - uses: actions/checkout@v4

      - uses: https://codeberg.org/mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Fuzz test and Cairn upload
        uses: https://git.ts.mattnite.net/mattnite/cairn/actions/cairn-zig-fuzz-afl@main
        with:
          cairn_server: ${{ secrets.CAIRN_SERVER_URL }}
          repo: protobuf
          owner: mattnite
          targets: |
            lexer
            resolve_string
            parser
            varint_decode
            varint_roundtrip
            zigzag32_roundtrip
            zigzag64_roundtrip
            tag_decode
            tag_roundtrip
            fixed32_roundtrip
            fixed64_roundtrip
            int32_roundtrip
            sint32_roundtrip
            sint64_roundtrip
            field_iterator
            skip_field
            skip_group
            packed_varint
            packed_fixed32
            packed_fixed64
            message_roundtrip
            json_scanner
            text_scanner
            dynamic_decode
          duration: "600"
          afl_args: "-m none"
          target: "x86_64-linux"
          seed_dir: "fuzz_seeds"
